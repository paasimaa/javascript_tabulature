<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Tab Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Guitar Tab Generator</h1>
      <p class="subtitle">Click the fretboard to place notes &mdash; navigate columns to build your tab</p>
    </header>

    <div class="fretboard-wrap">
      <canvas id="fretboard" width="960" height="200"></canvas>
    </div>

    <div class="controls">
      <div class="ctrl-group nav">
        <button id="btn-prev" disabled title="Previous column (Arrow Left)">&#9664; Prev</button>
        <span class="col-badge">
          Col <span id="col-num">1</span> / <span id="col-total">1</span>
        </span>
        <button id="btn-next" disabled title="Next column (Arrow Right)">Next &#9654;</button>
      </div>

      <div class="ctrl-group edit">
        <button id="btn-add" title="Insert column after current (Enter)">+ Add Column</button>
        <button id="btn-del" title="Delete current column">&#8722; Delete Column</button>
        <button id="btn-clear-col" title="Clear notes in current column (Backspace)">&#9003; Clear Column</button>
        <button id="btn-clear-all" class="danger" title="Clear everything">&#128465; Clear All</button>
        <button id="btn-add-rest" title="Insert rest of selected duration">&#9646; Add Pause</button>
        <button id="btn-end-set" title="End beam group and start a new one">&#9135; End Set</button>
        <button id="btn-pick" title="Toggle picking direction symbol (alternates down/up)">&#8897; Pick</button>
        <button id="btn-tech" title="Cycle hammer-on / pull-off mode (H → P → off)">H / P</button>
        <button id="btn-slide" title="Toggle slide mode">Slide</button>
        <button id="btn-bend" title="Cycle bend amount (1/2 step → full step → off)">Bend</button>
      </div>

      <div class="ctrl-group export">
        <button id="btn-copy" title="Copy tab to clipboard">&#9113; Copy Tab</button>
      </div>

      <div class="ctrl-group dur">
        <span class="ctrl-label">Duration:</span>
        <button id="dur-quarter" class="dur-btn active" title="Quarter note">
          <svg width="13" height="26" viewBox="0 0 13 26" fill="none">
            <ellipse cx="5.5" cy="21" rx="5" ry="3.5" transform="rotate(-18 5.5 21)" fill="currentColor"/>
            <line x1="10.2" y1="20" x2="10.2" y2="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Quarter
        </button>
        <button id="dur-8th" class="dur-btn" title="Eighth note">
          <svg width="18" height="26" viewBox="0 0 18 26" fill="none">
            <ellipse cx="5.5" cy="21" rx="5" ry="3.5" transform="rotate(-18 5.5 21)" fill="currentColor"/>
            <line x1="10.2" y1="20" x2="10.2" y2="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10.2,3 Q16,5.5 13.5,10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          </svg>
          8th
        </button>
        <button id="dur-16th" class="dur-btn" title="Sixteenth note">
          <svg width="18" height="26" viewBox="0 0 18 26" fill="none">
            <ellipse cx="5.5" cy="21" rx="5" ry="3.5" transform="rotate(-18 5.5 21)" fill="currentColor"/>
            <line x1="10.2" y1="20" x2="10.2" y2="3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            <path d="M10.2,3 Q16,5.5 13.5,10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
            <path d="M10.2,8 Q16,10.5 13.5,15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          </svg>
          16th
        </button>
      </div>
    </div>

    <div class="tab-section">
      <div class="tab-header">
        <span class="tab-title">Tab Preview</span>
        <span class="tab-hint">
          Click fretboard &rarr; place note &nbsp;|&nbsp; Enter &rarr; new column &nbsp;|&nbsp; &#8592;&#8594; &rarr; navigate
        </span>
      </div>
      <div class="tab-canvas-wrap">
        <canvas id="tab-canvas"></canvas>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
